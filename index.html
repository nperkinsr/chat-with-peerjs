<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Chat with PeerJS</title>

  <link rel=" stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel=" stylesheet" href="./style.css" />
  <script src="https://cdn.jsdelivr.net/npm/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>

<body>
  <div class="container">
    <header class="chat-header">
      <div class="brand-wrap">
        <img src="./assets/logo.png" alt="Chat logo" class="header-logo">
        <div class="header-text">
          <h1 id="greetingTitle">Hello!</h1>
          <p>Welcome to your chat</p>
        </div>
      </div>

      <div class="online-panel">
        <div class="online-row">
          <span id="onlineName1"></span>
          <span id="onlineDot1" class="status-dot"></span>
        </div>
        <div class="online-row">
          <span id="onlineName2"></span>
          <span id="onlineDot2" class="status-dot"></span>
        </div>
      </div>
    </header>

    <div class="join-row">
      <div id="hostSection" class="host-section" style="display:none;">
        <span class="join-label">Joining code:</span>
        <div class="join-pill">
          <span id="peerId">---</span>
          <button id="copyPeerId" aria-label="Copy joining code">
            <i class="bi bi-copy"></i>
          </button>
        </div>
      </div>

      <div id="guestSection" class="join-section" style="display:none;">
        <span class="join-label">Joining code:</span>
        <div class="join-input-wrap">
          <input type="text" id="peerInput" placeholder="lzif30iy">
          <button id="joinBtn" aria-label="Join chat">
            <i class="bi bi-arrow-right-circle"></i>
          </button>
        </div>
      </div>
    </div>

    <div class="chat-section">
      <div id="chatBox" class="chat-box"></div>
      <div class="message-row">
        <input type="text" id="messageInput" placeholder="Type your message">
        <button id="sendBtn" aria-label="Send message">
          <i class="bi bi-send"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- THIS IS THE MODAL AT THE START -->
  <div id="modal" class="modal">
    <div class="welcome-screen">
      <img src="./assets/logo.png" alt="Chat logo" class="welcome-logo">
      <h2 class="welcome-title">Welcome to the chat</h2>

      <div class="welcome-card">
        <h3 class="welcome-subtitle">Enter your name</h3>
        <input type="text" id="userName" placeholder="Charlie">
        <div class="role-buttons">
          <button id="hostBtn">Host</button>
          <button id="guestBtn">Guest</button>
        </div>
      </div>
      <p id="nameRequiredMessage" class="name-required-message">You need to add your name to continue!</p>
    </div>
  </div>

  <script src="./scripts.js"></script>
</body>

</html>
